<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineCloud</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        #game-container { width: 100vw; height: 100vh; }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
        }
        #crosshair::before { width: 2px; height: 16px; left: 7px; }
        #crosshair::after { width: 16px; height: 2px; top: 7px; }
        
        #debug {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            text-shadow: 1px 1px 1px #000;
            z-index: 100;
        }
        
        #player-list-container {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 4px;
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            z-index: 100;
        }
        #player-list-container h3 {
            font-size: 11px;
            margin-bottom: 4px;
            color: #aaa;
            text-transform: uppercase;
        }
        #player-list { list-style: none; }
        #player-list li { padding: 2px 0; }
        #player-list li.self { color: #55FF55; }
        
        #hotbar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #555;
            border-radius: 4px;
            z-index: 100;
        }
        .hotbar-slot {
            width: 36px;
            height: 36px;
            border: 2px solid #333;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        .hotbar-slot.selected {
            border-color: #fff;
            box-shadow: 0 0 4px #fff;
        }
        .hotbar-slot .slot-num {
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 1px #000;
        }
        
        #connecting {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 18px;
            z-index: 200;
        }
        
        #hit-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 99;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="crosshair"></div>
    <div id="hit-indicator"></div>
    <div id="debug">
        <div>FPS: <span id="fps">0</span></div>
        <div><span id="position">X: 0 Y: 0 Z: 0</span></div>
        <div><span id="status">Connecting...</span></div>
        <div>RTX: <span id="rtx-status">Off</span></div>
    </div>
    <div id="player-list-container">
        <h3>Players</h3>
        <ul id="player-list"><li>Loading...</li></ul>
    </div>
    <div id="hotbar"></div>
    <div id="connecting">Connecting to server...</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/world.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/game.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
